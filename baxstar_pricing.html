<script>
(function () {
  'use strict';

  var heightMap = new WeakMap();

  function findIframeForSource(sourceWindow) {
    var frames = document.querySelectorAll('iframe');
    for (var i = 0; i < frames.length; i++) {
      try { if (frames[i].contentWindow === sourceWindow) return frames[i]; } catch (e) {}
    }
    return null;
  }

  function setSize(el, h) {
    if (!el || !h) return;
    el.style.height = h + 'px';
    el.style.minHeight = h + 'px';
    el.style.maxHeight = 'none';
  }

  function findWrappingSection(iframe) {
    var node = iframe.parentElement;
    var hops = 0;
    while (node && hops < 10) {
      var tag = (node.tagName || '').toLowerCase();
      var id  = (node.id || '').toUpperCase();
      var mesh = (node.getAttribute && node.getAttribute('data-mesh-id') || '').toUpperCase();
      var role = (node.getAttribute && node.getAttribute('role') || '').toLowerCase();

      if (tag === 'body' || tag === 'html') return null;
      if (tag === 'header' || tag === 'nav' || tag === 'main') return null;
      if (role === 'navigation' || role === 'banner') return null;
      if (id.indexOf('HEADER') !== -1 || id.indexOf('MENU') !== -1 || id.indexOf('NAV') !== -1) return null;
      if (mesh.indexOf('HEADER') !== -1 || mesh.indexOf('MENU') !== -1 || mesh.indexOf('NAV') !== -1) return null;

      if (tag === 'section') return node;
      if (mesh && (mesh.indexOf('SECTION') !== -1 || mesh.indexOf('INLINECONTENT') !== -1)) return node;

      node = node.parentElement;
      hops++;
    }
    return null;
  }

  function resizeIframeAndAncestors(iframe, h) {
    if (!iframe || !h) return;
    setSize(iframe, h);

    var node = iframe.parentElement;
    var hops = 0;
    var section = null;
    while (node && hops < 6) {
      var tag = (node.tagName || '').toLowerCase();
      if (tag === 'body' || tag === 'html' || tag === 'main' || tag === 'header' || tag === 'nav') break;

      var role = (node.getAttribute && node.getAttribute('role') || '').toLowerCase();
      if (role === 'navigation' || role === 'banner') break;

      if (tag === 'section') { section = node; }
      if (tag !== 'section') { setSize(node, h); }

      if (section) break;
      node = node.parentElement;
      hops++;
    }

    var wrappingSection = section || findWrappingSection(iframe);
    if (wrappingSection) setSize(wrappingSection, h);
  }

  window.addEventListener('message', function (e) {
    var data = e.data;
    var h = 0;

    if (typeof data === 'string') {
      var m = data.match(/^height:(\d+)/);
      if (m) h = parseInt(m[1], 10);
    } else if (data && typeof data === 'object') {
      if (data.type === 'setHeight' || data.type === 'embed-size' || data.type === 'embedSize') {
        h = parseInt(data.height, 10);
      }
    }

    if (!h || h < 50 || h > 20000) return;

    var iframe = findIframeForSource(e.source);
    if (!iframe) return;

    var lastH = heightMap.get(iframe) || 0;
    if (Math.abs(h - lastH) < 4) return;
    heightMap.set(iframe, h);

    resizeIframeAndAncestors(iframe, h);
  }, false);

  var resizeTimer;
  window.addEventListener('resize', function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function () {
      var frames = document.querySelectorAll('iframe');
      frames.forEach(function (f) {
        var h = heightMap.get(f);
        if (h) resizeIframeAndAncestors(f, h);
      });
    }, 150);
  });

})();
</script>

<script>
(function () {
  window.dataLayer = window.dataLayer || [];
  window.addEventListener('message', function (e) {
    if (!e.data || typeof e.data !== 'object') return;
    if (e.data.type !== 'baxstar_event') return;
    window.dataLayer.push({
      event: e.data.event || 'baxstar_event',
      location: e.data.location || 'unknown',
      trip: e.data.trip || null
    });
  });
})();
</script>
