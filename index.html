  </main>

  <script>
    (function () {
      var frames = Array.prototype.slice.call(document.querySelectorAll('.baxstar-section-frame'));
      var byWindow = new Map();

      function setFrameHeight(frame, height) {
        var safeHeight = Math.max(Number(height) || 0, frame.dataset.section === 'hero' ? window.innerHeight : 120);
        frame.style.height = Math.ceil(safeHeight) + 'px';
      }

      function measure(frame) {
        try {
          var doc = frame.contentDocument || frame.contentWindow.document;
          if (!doc) return;
          var body = doc.body;
          var html = doc.documentElement;
          var height = Math.max(
            body ? body.scrollHeight : 0,
            body ? body.offsetHeight : 0,
            html ? html.clientHeight : 0,
            html ? html.scrollHeight : 0,
            html ? html.offsetHeight : 0
          );
          if (height) setFrameHeight(frame, height);
        } catch (e) {}
      }

      function register(frame) {
        if (frame.contentWindow) byWindow.set(frame.contentWindow, frame);
        frame.addEventListener('load', function () {
          if (frame.contentWindow) byWindow.set(frame.contentWindow, frame);
          measure(frame);
          setTimeout(function () { measure(frame); }, 350);
          setTimeout(function () { measure(frame); }, 1200);
        });
      }

      frames.forEach(register);

      window.addEventListener('message', function (event) {
        var frame = byWindow.get(event.source);
        if (!frame) return;
        var data = event.data;
        var height = null;

        if (typeof data === 'string' && data.indexOf('height:') === 0) {
          height = parseInt(data.split(':')[1], 10);
        } else if (data && typeof data === 'object') {
          if (data.type === 'setHeight' || data.type === 'embed-size' || data.height) {
            height = data.height;
          }
        }

        if (height) setFrameHeight(frame, height);
      });

      window.addEventListener('resize', function () {
        frames.forEach(measure);
      }, { passive: true });

      if ('IntersectionObserver' in window) {
        var visibilityObserver = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            var frame = entry.target;
            try {
              frame.contentWindow.postMessage({ type: 'baxstar_visibility', hidden: !entry.isIntersecting }, '*');
            } catch (e) {}
          });
        }, { threshold: 0.01 });

        frames.forEach(function (frame) { visibilityObserver.observe(frame); });
      }
    }());
  </script>
