name: Baxstar Daily HTML Checkup

on:
  schedule:
    - cron: '0 14 * * *'   # 8:00 AM CST (UTC-6) every day
  workflow_dispatch:         # also lets you trigger it manually from GitHub

permissions:
  contents: read
  issues: write

jobs:
  checkup:
    name: Detect Changed Section Files
    runs-on: ubuntu-latest

    steps:

      # ── 1. Check out the full repo history ──────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history needed for accurate diffing

      # ── 2. Find baxstar_*.html files changed in the last 24 hours ───────
      - name: Detect changes
        id: detect
        run: |
          echo "Scanning for baxstar_*.html changes in the last 24 hours..."

          SINCE=$(date -u -d '24 hours ago' +"%Y-%m-%dT%H:%M:%SZ")

          # Get all commits in the last 24h
          COMMITS=$(git log --since="$SINCE" --format="%H" -- 'baxstar_*.html')

          if [ -z "$COMMITS" ]; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
            echo "changed_files=" >> $GITHUB_OUTPUT
            echo "commit_count=0" >> $GITHUB_OUTPUT
          else
            # Get unique list of changed baxstar_ files
            CHANGED=$(git log --since="$SINCE" --name-only --pretty=format: -- 'baxstar_*.html' \
              | grep 'baxstar_.*\.html' | sort -u)

            COMMIT_COUNT=$(echo "$COMMITS" | wc -l)
            # Encode newlines for GitHub output
            CHANGED_ESCAPED="${CHANGED//$'\n'/'|'}"

            echo "no_changes=false" >> $GITHUB_OUTPUT
            echo "changed_files=$CHANGED_ESCAPED" >> $GITHUB_OUTPUT
            echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          fi

      # ── 3. Build the change report ────────────────────────────────────
      - name: Build report
        id: report
        if: steps.detect.outputs.no_changes == 'false'
        run: |
          SINCE=$(date -u -d '24 hours ago' +"%Y-%m-%dT%H:%M:%SZ")
          NOW=$(date -u +"%Y-%m-%d %H:%M UTC")
          FILES="${{ steps.detect.outputs.changed_files }}"
          COUNT="${{ steps.detect.outputs.commit_count }}"

          # Build file list markdown
          FILE_LIST=""
          IFS='|' read -ra FARRAY <<< "$FILES"
          for f in "${FARRAY[@]}"; do
            [ -n "$f" ] && FILE_LIST="$FILE_LIST- \`$f\`\n"
          done

          # Get commit log for those files
          LOG=$(git log --since="$SINCE" \
            --pretty=format:"- %h — %s (%ar)" \
            -- 'baxstar_*.html' | head -20)

          # Write report to file (avoids env var size limits)
          cat > /tmp/report.md << REPORT
          ## 🎣 Baxstar HTML Checkup — $NOW

          **$COUNT commit(s)** modified section files in the last 24 hours.

          ### Changed Files
          $(echo -e "$FILE_LIST")

          ### Commit Log
          $LOG

          ---

          ### ✅ Next Step
          Open a Claude session and say:

          > **"Run the Baxstar checkup — sync GitHub changes to project files and update Wix."**

          Claude will:
          1. Pull the changed files from \`baxstarcode/bax1\`
          2. Sync updates into the Claude project
          3. Use the Chrome extension to open Wix and update each changed embed section

          ---
          *This issue was auto-generated by the Baxstar Daily Checkup Action.*
          *Close it once the Claude session is complete.*
          REPORT

          echo "report_path=/tmp/report.md" >> $GITHUB_OUTPUT

      # ── 4. Open a GitHub Issue (triggers email to you) ────────────────
      - name: Create issue — changes detected
        if: steps.detect.outputs.no_changes == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/report.md', 'utf8');
            const today = new Date().toISOString().split('T')[0];

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `🎣 HTML Section Changes Detected — ${today}`,
              body:  body,
              labels: ['checkup', 'needs-wix-update']
            });

      # ── 5. All clear — write to job summary (no issue opened) ─────────
      - name: All clear summary
        if: steps.detect.outputs.no_changes == 'true'
        run: |
          NOW=$(date -u +"%Y-%m-%d %H:%M UTC")
          echo "## ✅ Baxstar Checkup — $NOW" >> $GITHUB_STEP_SUMMARY
          echo "No changes to \`baxstar_*.html\` files in the last 24 hours." >> $GITHUB_STEP_SUMMARY
          echo "No action needed." >> $GITHUB_STEP_SUMMARY
